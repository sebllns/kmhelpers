name: Deploy docs

on:
  push:
    branches:
      - docs

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: python -m pip install --upgrade pip && pip install -e .[docs]

      - name: Log docs tool versions
        run: |
          python --version
          pip list | grep -iE "mkdocs|mkdocstrings|griffe|mike|termynal|markdown|pymdown" || true

      - name: Freeze commit hash
        run: python scripts/freeze_commit.py

      - name: Debug - import and collect composer
        run: |
          echo "=== python import ==="
          python -c "import pykmhelpers.pipeline.composer as m; print('import OK:', m.__file__)" || true
          echo "=== griffe static collect ==="
          python -c "import griffe; griffe.load('pykmhelpers.pipeline.composer'); print('griffe load OK')" || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve docs version
        id: version
        run: |
          # Strip pre/dev suffix so 0.6.3.dev0 -> 0.6.3
          version=$(python -c "from importlib.metadata import version; from packaging.version import Version; v=Version(version('pykmhelpers')); print(v.base_version)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Deploy with mike
        run: mike deploy --push --update-aliases "${{ steps.version.outputs.version }}" latest