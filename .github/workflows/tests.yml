name: Tests

on:
  push:
    branches-ignore:
      - 'paper'
    paths-ignore:
      - 'docs/**'
      - 'paper/**'
      - 'assets/**'
      - '**.md'
      - 'mkdocs.yml'
      - 'LICENSE'
  pull_request:
    branches-ignore:
      - 'paper'
    paths-ignore:
      - 'docs/**'
      - 'paper/**'
      - 'assets/**'
      - '**.md'
      - 'mkdocs.yml'
      - 'LICENSE'

jobs:
  # Pure syntax check on the lowest supported Pythons. Catches version-specific
  # syntax (e.g. 3.12+ nested-quote f-strings) that passes on newer local envs.
  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all sources
        run: python -m compileall -q pykmhelpers

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          environment-file: conda/environment.yml
          activate-environment: kmhelpers

      - name: Install dev dependencies
        shell: bash -el {0}
        run: pip install -e .[dev]

      - name: Run tests
        shell: bash -el {0}
        run: pytest pykmhelpers/tests
