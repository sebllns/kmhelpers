package:
  name: kmhelpers
  version: "{{ environ['GIT_DESCRIBE_TAG'] }}"

source:
  git_url: https://github.com/sebllns/kmhelpers.git
  git_rev: "{{ environ['GIT_DESCRIBE_TAG'] }}"

build:
  number: 0
  noarch: python
  script: python -m pip install --no-deps --ignore-installed .

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - psutil >=5.8.0
    - pyyaml >=5.4
    # TODO: bump version once --static-repart is released on bioconda (currently only in next-dev)
    - bioconda::kmindex >=0.5.3

test:
  imports:
    - kmhelpers
    - kmhelpers.core
    - kmhelpers.operations
    - kmhelpers.cli

about:
  home: https://github.com/sebllns/kmhelpers
  license: MIT
  license_family: BSD
  summary: A Python toolkit for managing, compressing, and querying indexes with kmindex
  description: |
    kmhelpers provides a comprehensive interface for working with k-mer indices,
    specifically designed for handling large-scale genomic data. It offers tools for:
    - Index management, validation, and querying
    - Index compression with intelligent reordering and block compression
    - Fast k-mer lookup with resource monitoring
    - Compression metrics and performance tracking
  doc_url: https://github.com/sebllns/kmhelpers/blob/main/README.md
  dev_url: https://github.com/sebllns/kmhelpers

extra:
  recipe-maintainers:
    - sebllns
