site_name: kmhelpers documentation
site_description: A Python toolkit for managing, compressing, and querying kmindex indices efficiently.
site_author: Sébastien Bellenous
repo_url: https://github.com/sebllns/kmhelpers
repo_name: sebllns/kmhelpers

theme:
  name: material
  logo: assets/kmhelpers-logo-v1.png
  favicon: assets/kmhelpers-logo-v1.png
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  navigation_depth: 3
  features:
    - navigation.tabs
    - navigation.tracking
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .
  - tables
  - attr_list

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Commands:
      - Overview: commands/index.md
      - Main Commands:
          - list: commands/list.md
          - profile: commands/profile.md
          - compose: commands/compose.md
          - plan: commands/plan.md
          - apply: commands/apply.md
          - query: commands/query.md
          - compress: commands/compress.md
      - Utilities:
          - registry: commands/registry.md
          - pipeline: commands/pipeline.md
  - Changelog: changelog.md
  - Contributing:
      - Building the Docs: contributing/docs.md
